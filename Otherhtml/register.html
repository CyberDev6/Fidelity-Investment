<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIDELITY - Create Your Profile</title>
<style>
:root {
--bg-dark: #0f0f11;
--card-bg: #16161a;
--card-sub-bg: #1e1e24;
--text-white: #ffffff;
--text-muted: #8e8e93;
--accent-green: #00ff87;
--green-gradient: linear-gradient(135deg, #11998e, #38ef7d);
--border-color: #2a2a32;
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
background-color: var(--bg-dark);
color: var(--text-white);
padding: 20px;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
}

.container {
width: 100%;
max-width: 540px;
}

.card {
background-color: var(--card-bg);
border-radius: 16px;
padding: 32px;
border: 1px solid var(--border-color);
box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.brand-header {
text-align: center;
margin-bottom: 24px;
}

.brand-logo {
font-size: 28px;
font-weight: 800;
letter-spacing: 2px;
background: var(--green-gradient);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

.page-title {
font-size: 22px;
font-weight: 700;
margin-bottom: 24px;
text-align: center;
}

.form-section {
margin-bottom: 24px;
}

.section-title {
font-size: 13px;
font-weight: 700;
color: var(--accent-green);
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 14px;
border-bottom: 1px solid var(--border-color);
padding-bottom: 6px;
}

.form-grid {
display: grid;
grid-template-columns: 1fr;
gap: 16px;
}

@media (min-width: 480px) {
.form-grid.two-col { grid-template-columns: 1fr 1fr; }
.form-grid.three-col { grid-template-columns: 1fr 1fr 1fr; }
}

.input-group {
display: flex;
flex-direction: column;
gap: 6px;
}

.input-label {
font-size: 13px;
color: var(--text-muted);
}

.form-input {
width: 100%;
background-color: var(--card-sub-bg);
border: 1px solid var(--border-color);
border-radius: 10px;
padding: 14px;
color: var(--text-white);
font-size: 15px;
outline: none;
transition: border-color 0.2s;
}

.form-input:focus {
border-color: #38ef7d;
}

.primary-btn {
width: 100%;
background: var(--green-gradient);
color: #000000;
border: none;
border-radius: 12px;
padding: 16px;
font-size: 16px;
font-weight: 700;
cursor: pointer;
transition: box-shadow 0.2s;
}

.primary-btn:hover {
box-shadow: 0 4px 20px rgba(56, 239, 125, 0.3);
}

.switch-page-link {
text-align: center;
margin-top: 20px;
font-size: 14px;
color: var(--text-muted);
}

.switch-page-link a {
color: var(--accent-green);
text-decoration: none;
font-weight: 600;
}

/* Modern 10s Processing Overlay */
#loadingOverlay {
display: block; /* Fixed layout visibility inside card container */
text-align: center;
padding: 40px 20px;
}

.spinner {
width: 55px;
height: 55px;
border: 4px solid var(--card-sub-bg);
border-top: 4px solid #38ef7d;
border-radius: 50%;
margin: 0 auto 20px auto;
animation: spin 1s linear infinite;
}

@keyframes spin {
0% { transform: rotate(0deg); }
100% { transform: rotate(360deg); }
}

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="container">
<div class="brand-header">
<div class="brand-logo">FIDELITY</div>
</div>

<!-- REGISTER PROFILE CARD -->
<div class="card" id="formCard">
<div class="page-title">Create Your Profile</div>

<form id="registrationForm">
<!-- Personal Details -->
<div class="form-section">
<div class="section-title">Personal Details</div>
<div class="form-grid three-col">
<div class="input-group">
<label class="input-label">First Name</label>
<input type="text" class="form-input" id="firstName" required placeholder="Lauren">
</div>
<div class="input-group">
<label class="input-label">Middle Name</label>
<input type="text" class="form-input" id="middleName" placeholder="Frank">
</div>
<div class="input-group">
<label class="input-label">Last Name</label>
<input type="text" class="form-input" id="lastName" required placeholder="Smith">
</div>
</div>
</div>

<!-- Identity & Contact -->
<div class="form-section">
<div class="section-title">Identity & Contact</div>
<div class="form-grid two-col">
<div class="input-group">
<label class="input-label">SSN</label>
<input type="password" class="form-input" id="ssn" required placeholder="000-00-0000">
</div>
<div class="input-group">
<label class="input-label">Date of Birth</label>
<input type="date" class="form-input" id="dob" required>
</div>
<div class="input-group">
<label class="input-label">Mobile Number</label>
<input type="tel" class="form-input" id="mobileNumber" required placeholder="+1">
</div>
<div class="input-group">
<label class="input-label">Email Address</label>
<input type="email" class="form-input" id="email" required placeholder="example@mail.com">
</div>
</div>
</div>

<!-- Address Info -->
<div class="form-section">
<div class="section-title">Where Do You Live</div>
<div class="form-grid">
<div class="input-group">
<label class="input-label">Address Line 1</label>
<input type="text" class="form-input" id="address1" required placeholder="Street address">
</div>
</div>
<div class="form-grid three-col" style="margin-top: 16px;">
<div class="input-group">
<label class="input-label">City</label>
<input type="text" class="form-input" id="city" required placeholder="City">
</div>
<div class="input-group">
<label class="input-label">State</label>
<input type="text" class="form-input" id="state" required placeholder="State">
</div>
<div class="input-group">
<label class="input-label">Zip Code</label>
<input type="text" class="form-input" id="zipCode" required placeholder="Zip">
</div>
</div>
</div>

<button type="submit" class="primary-btn">Continue</button>
</form>

<div class="switch-page-link">
Already have an account? <a href="./login.html">Sign In here</a>
</div>
</div>

<!-- 10-SECOND LOADING CARD -->
<div class="card hidden" id="loadingCard">
<div id="loadingOverlay">
<div class="spinner"></div>
<div style="font-size: 18px; font-weight: 600; margin-bottom: 6px;">Generating Secure Profile...</div>
<div style="color: var(--text-muted); font-size: 14px;">Your credentials will be ready in <span id="timerText" style="color: #38ef7d; font-weight: bold;">10</span>s</div>
</div>
</div>

</div>

<script>
document.getElementById('registrationForm').addEventListener('submit', function(e) {
e.preventDefault();

// Capture form values accurately
const firstName = document.getElementById('firstName').value.trim();
const middleName = document.getElementById('middleName').value.trim();
const lastName = document.getElementById('lastName').value.trim();
const ssn = document.getElementById('ssn').value.trim();
const dob = document.getElementById('dob').value.trim();
const mobileNumber = document.getElementById('mobileNumber').value.trim();
const email = document.getElementById('email').value.trim();
const address1 = document.getElementById('address1').value.trim();
const city = document.getElementById('city').value.trim();
const state = document.getElementById('state').value.trim();
const zipCode = document.getElementById('zipCode').value.trim();

// Format address completely into a single matrix display line
const fullAddressMatrix = address1 + ", " + city + ", " + state + " " + zipCode;

// Automatically generate a sleek username & secure password using their details
const generatedUsername = `${firstName.toLowerCase()}_fidelity`;
const generatedPassword = 'FID-' + Math.floor(100000 + Math.random() * 900000);

// Save EVERYTHING safely to local storage so the dashboard and login can fetch them
localStorage.setItem('userFirstName', firstName);
localStorage.setItem('userMiddleName', middleName);
localStorage.setItem('userLastName', lastName);
localStorage.setItem('userSSN', ssn);
localStorage.setItem('userDOB', dob);
localStorage.setItem('userPhone', mobileNumber);
localStorage.setItem('userEmail', email);
localStorage.setItem('userAddress', fullAddressMatrix);

localStorage.setItem('tempUser', generatedUsername);
localStorage.setItem('tempPass', generatedPassword);

// Switch to the professional 10-second loader view
document.getElementById('formCard').className = 'card hidden';
document.getElementById('loadingCard').className = 'card';

let count = 10;
const countdown = setInterval(() => {
count--;
document.getElementById('timerText').innerText = count;

if (count <= 0) {
clearInterval(countdown);
// 10 seconds finished, auto-redirect straight to the separate login file
window.location.href = "login.html";
}
}, 1000);
});
</script>
</body>
</html>
